packages:
  - "apps/*"
  - "packages/*"

overrides:
  "@types/react": "19.1.13"
  "@types/react-dom": "19.1.9"

allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@prisma/engines": true
  "@scarf/scarf": false
  "@swc/core": true
  "@tailwindcss/oxide": true
  bcrypt: true
  core-js-pure: false
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
