server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use the compose service name as the `service` label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Strip the leading slash from container name
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      # Parse the pino JSON log line
      - json:
          expressions:
            level: level
            context: context
      # Promote level and context to Loki labels for efficient filtering
      - labels:
          level:
          context:
